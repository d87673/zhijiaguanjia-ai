# 智家管家AI — Nginx 反向代理 + 静态文件服务 (生产优化版)
# 优化内容: gzip_static, brotli, proxy_buffering, SSE 超时, SSL stub, 安全头

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志（JSON 格式便于 ELK 采集）
    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time"'
    '}';
    access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ── 性能优化 ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;

    # ── 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ── 安全头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 上传限制 ──
    client_max_body_size 10m;

    # ── 请求限制 ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream 后端 ──
    upstream backend_pool {
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # SSL 优化（Let's Encrypt）
        # listen 443 ssl http2;
        # ssl_certificate /etc/letsencrypt/live/your-domain/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 1d;

        root /usr/share/nginx/html;
        index index.html;
        limit_conn conn_limit 20;

        # ── API 反向代理 ──
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://backend_pool/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 缓冲
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;

            # 超时
            proxy_read_timeout 120s;   # SSE / AI 长时间请求
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }

        # ── SSE 专用路径（禁用缓冲，长连接）──
        location ~ ^/api/v1/(h5|staff-app)/.*/stream$ {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # SSE 关键：禁用缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 360s;
            chunked_transfer_encoding on;
        }

        # ── 登录接口特殊限流 ──
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://backend_pool/api/v1/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── API 文档 ──
        location /docs {
            proxy_pass http://backend_pool/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://backend_pool/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── 健康检查 ──
        location /health {
            proxy_pass http://backend_pool/api/v1/health;
            access_log off;
        }

        # ── SPA 路由 ──
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── 静态资源缓存 ──
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable, stale-while-revalidate=86400";
            add_header Vary "Accept-Encoding";
        }

        # ── PWA Manifest / SW ──
        location = /manifest.json {
            expires 1d;
            add_header Cache-Control "public";
        }
        location = /sw.js {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
