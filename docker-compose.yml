# 智家管家AI — Docker Compose 生产部署配置

version: "3.8"

services:
  # ========== PostgreSQL 16 ==========
  db:
    image: postgres:16-alpine
    container_name: home-service-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: home_service_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ========== Redis 7 ==========
  redis:
    image: redis:7-alpine
    container_name: home-service-redis
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - app-network

  # ========== FastAPI Backend ==========
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: home-service-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@db:5432/home_service_ai
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:${DB_PASSWORD:-postgres}@db:5432/home_service_ai
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  # ========== Nginx (Frontend + Reverse Proxy) ==========
  nginx:
    image: nginx:alpine
    container_name: home-service-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge
